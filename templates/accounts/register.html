{% extends 'base.html' %}

{% block title %}Register - My Restaurant{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4">Create New Account</h2>
                    
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-danger w-100 mt-3 py-2">Register</button>
                    </form>

                    <div class="text-center mt-4">
                        <p>Already have an account? 
                            <a href="{% url 'login' %}" class="text-danger">Login here</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
